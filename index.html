<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>quinsachisweet16</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Password Gate ── -->
  <div id="gate">
    <div class="gate-card">
      <p class="gate-label">✦ enter the secret ✦</p>
      <p class="gate-clue">tanggal lahir pacarnya qaysaraqeel</p>
      <div class="gate-boxes" id="gateBoxes">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
        <input class="gate-box" type="password" inputmode="numeric" maxlength="1">
      </div>
      <p class="gate-error" id="gateError">wrong password, try again.</p>
      <button id="gateBtn">unlock</button>
    </div>
  </div>

  <!-- ── Letter Popup ── -->
  <div id="letter">
    <div class="letter-card">
      <p class="letter-to">for quinsachi,</p>
      <p class="letter-body" id="letterBody"></p>
      <button id="letterBtn">Open the Scrapbook ✦</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <div class="scene">
    <button class="btn-nav btn-prev" id="btnPrev">&#8249;</button>

    <div class="book-shadow"></div>
    <div class="book-container">
      <div class="spine"></div>
      <div id="book">

        <!-- Halaman 1: dummy tak terlihat -->
        <div class="page blank"></div>

        <!-- Spread 1 (hal 2-3): kiri=11 Belakang, kanan=1 Depan -->
        <div class="page"><img src="page/11 Belakang.png" alt=""></div>
        <div class="page"><img src="page/1 Depan.png"     alt=""></div>

        <!-- Spread 2 (hal 4-5) -->
        <div class="page"><img src="page/1 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/2 Depan.png"     alt=""></div>

        <!-- Spread 3 (hal 6-7) -->
        <div class="page"><img src="page/2 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/3 Depan.png"     alt=""></div>

        <!-- Spread 4 (hal 8-9) -->
        <div class="page"><img src="page/3 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/4 Depan.png"     alt=""></div>

        <!-- Spread 5 (hal 10-11) -->
        <div class="page"><img src="page/4 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/5 Depan.png"     alt=""></div>

        <!-- Spread 6 (hal 12-13) -->
        <div class="page"><img src="page/5 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/6 Depan.png"     alt=""></div>

        <!-- Spread 7 (hal 14-15) -->
        <div class="page"><img src="page/6 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/7 Depan.png"     alt=""></div>

        <!-- Spread 8 (hal 16-17) -->
        <div class="page"><img src="page/7 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/8 Depan.png"     alt=""></div>

        <!-- Spread 9 (hal 18-19) -->
        <div class="page"><img src="page/8 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/9 Depan.png"     alt=""></div>

        <!-- Spread 10 (hal 20-21) -->
        <div class="page"><img src="page/9 Belakang.png"  alt=""></div>
        <div class="page"><img src="page/10 Depan.png"    alt=""></div>

        <!-- Spread 11 (hal 22-23) -->
        <div class="page"><img src="page/10 Belakang.png" alt=""></div>
        <div class="page"><img src="page/11 Depan.png"    alt=""></div>

        <!-- Spread 12 (hal 24-25): looping = sama dengan spread 1 -->
        <div class="page"><img src="page/11 Belakang.png" alt=""></div>
        <div class="page"><img src="page/1 Depan.png"     alt=""></div>

      </div>
    </div>

    <button class="btn-nav btn-next" id="btnNext">&#8250;</button>

    <!-- Spotify popup -->
    <div id="spotifyPopup">
      <div class="spotify-card">
        <p class="spotify-label">&#9835; a playlist, just for you</p>
        <a href="https://open.spotify.com/playlist/6HqfB7rETX0VYIYaxap55V?si=9db853483a804c03&pt=b6247c5b76f0a946c9e91d4cc31a28de" target="_blank" class="spotify-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          open playlist
        </a>
        <button class="spotify-close" id="spotifyClose">&#10005;</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="turn.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
